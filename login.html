<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNAT - Menú SOL</title>
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <main class="login-page-wrapper">
        <div class="login-header-text">
            <h1>Bienvenido</h1>
            <h2>Ingresa los datos de tu Clave SOL</h2>
        </div>

        <div class="login-card-simple">
            <div class="login-tabs-simple">
                <button class="tab-btn-simple active" id="tab-ruc">RUC</button>
                <button class="tab-btn-simple" id="tab-dni">DNI</button>
            </div>

            <div class="login-form-simple">
                <input type="text" placeholder="RUC" id="ruc-field">
                <input type="text" placeholder="Usuario" id="user-field">
                <input type="password" placeholder="Contraseña" id="pass-field">

                <div class="remember-me-simple">
                    <span>Recuérdame, para entrar más fácil</span>
                    <label class="switch-simple">
                        <input type="checkbox">
                        <span class="slider-simple round"></span>
                    </label>
                </div>

                <div class="forgot-link-simple">
                    <a href="https://www.gob.pe/7550-recuperar-la-clave-sol" target="_blank">Si olvidaste tu usuario y/o contraseña solicítalos desde SUNAT Virtual</a>
                </div>

                <button class="btn-entrar-simple">Entrar</button>
            </div>
        </div>

        <div style="margin-top: 30px; text-align: center;">
            <a href="index.html" class="btn-back-home">
                <i class="fas fa-arrow-left"></i> Volver a pantalla inicial
            </a>
        </div>
    </main>

    <footer class="dashboard-footer-slim">
        <div class="footer-left">
            <span><i class="fas fa-laptop-code"></i> Simulador de prueba | Elaborado por <strong>Eduardo Mamani Roque</strong></span>
        </div>
        <div class="footer-right">
            <a href="https://www.sunat.gob.pe/portalanterior.html" target="_blank">Aprende en la página oficial de SUNAT</a>
        </div>
    </footer>

    <script src="login.js"></script>
</body>
</html>
